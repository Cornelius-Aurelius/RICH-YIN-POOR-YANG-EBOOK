function effectiveFontSize(){const vw=Math.max(320,Math.min(innerWidth||390,document.documentElement.clientWidth||390)); const cap=vw<=520?Math.max(16,Math.min(20,Math.floor(vw*.049))):fontSize; return Math.min(fontSize,cap)}
function applyPrefs(){document.body.dataset.theme=theme; document.documentElement.style.setProperty('--fontSize',effectiveFontSize()+'px')}
function savePrefs(){store.set(LS+':fontSize',fontSize); store.set(LS+':theme',theme)}
function render(){const p=pages[current]||pages[0]; if(p.type==='cover'){pageEl.className='reader-page cover-page'; pageEl.innerHTML=`<div class="cover-wrap"><img src="${DATA.cover}" alt="Rich Yin Poor Yang book cover by Cornelius Aurelius" decoding="async" fetchpriority="high"></div>${ready?'':'<div class="loading-note">Preparing pages...</div>'}`;} else {pageEl.className='reader-page text-page'; pageEl.innerHTML=p.fragments.map(htmlFor).join('')} prevBtn.disabled=current<=0; nextBtn.disabled=!ready&&current>=pages.length-1; const small=matchMedia('(max-width:520px)').matches; counter.textContent=p.type==='cover'?(ready&&!small?`Cover · ${pages.length} pages`:'Cover'):(small?`${current+1} / ${pages.length}`:`Page ${current+1} of ${pages.length}`); store.set(LS+':page',current)}
function resetMeasure(){measure.innerHTML=''}
function testAdd(f){const n=nodeFor(f); measure.appendChild(n); const ok=measure.scrollHeight<=maxHeight+1 && measure.scrollWidth<=measure.clientWidth+2; measure.removeChild(n); return ok}
function newTextPage(){const p={type:'text',fragments:[]}; pages.push(p); resetMeasure(); return p}
function addFrag(p,f){p.fragments.push(f); measure.appendChild(nodeFor(f)); if(f.id&&!sectionPage.has(f.id))sectionPage.set(f.id,pages.length-1)}
function words(s){return String(s).trim().split(/\s+/).filter(Boolean)}
function findFit(b,w,start){let lo=start+1,hi=w.length,best=start; while(lo<=hi){const mid=(lo+hi)>>1,piece=w.slice(start,mid).join(' '),frag={kind:b.kind,text:piece,source:b.source,cont:start>0}; if(testAdd(frag)){best=mid;lo=mid+1}else hi=mid-1} return best}
function paginateNow(){if(paginating)return; paginating=true; ready=false; pages=[{type:'cover'}]; sectionPage=new Map([['cover',0]]); applyPrefs(); pageEl.className='reader-page text-page'; const r=pageEl.getBoundingClientRect(),safeW=Math.max(260,Math.floor(r.width)); measure.style.width=safeW+'px'; maxHeight=Math.max(260,Math.floor(r.height)-8); let pg=newTextPage(); for(let i=0;i<DATA.blocks.length;i++){const b=Object.assign({},DATA.blocks[i],{source:i}); if(b.breakBefore&&pg.fragments.length)pg=newTextPage(); if(!['p','summaryItem','tocline'].includes(b.kind)){if(pg.fragments.length&&!testAdd(b))pg=newTextPage(); addFrag(pg,b); continue} if(testAdd(b)){addFrag(pg,b); continue} const w=words(b.text); let pos=0; while(pos<w.length){let best=findFit(b,w,pos); if(best===pos){if(pg.fragments.length){pg=newTextPage(); continue} best=Math.min(w.length,pos+1)} addFrag(pg,{kind:b.kind,text:w.slice(pos,best).join(' '),source:b.source,cont:pos>0}); pos=best; if(pos<w.length)pg=newTextPage();}} if(pages[pages.length-1]?.type==='text'&&pages[pages.length-1].fragments.length===0)pages.pop(); buildToc(); ready=true; paginating=false; const saved=Number(store.get(LS+':page','0')||0); current=Math.min(Math.max(0,current||saved),pages.length-1); render()}
function buildToc(){const rows=[{id:'cover',title:'Cover'}].concat(DATA.toc); tocList.innerHTML=rows.map(r=>`<button data-jump="${esc(r.id)}">${esc(r.title)}</button>`).join(''); tocList.querySelectorAll('[data-jump]').forEach(btn=>btn.addEventListener('click',()=>{const p=sectionPage.get(btn.getAttribute('data-jump')); if(typeof p==='number'){current=p;closeOverlay();render()}}))}
function go(d){if(!ready&&d>0)return; current=Math.min(Math.max(0,current+d),pages.length-1); render()}
function closeMenu(){menu.classList.remove('open'); menuToggle.setAttribute('aria-expanded','false')}
function openOverlay(){tocOverlay.classList.add('open'); closeMenu()}
function closeOverlay(){tocOverlay.classList.remove('open')}
function repaginateSoon(){clearTimeout(pendingResize); const first=pages[current]?.fragments?.[0]?.source; pendingResize=setTimeout(()=>{applyPrefs(); paginateNow(); if(typeof first==='number'){const found=pages.findIndex(pg=>pg.fragments&&pg.fragments.some(f=>f.source===first)); if(found>0)current=found; render()}},180)}
menuToggle.addEventListener('click',()=>{const open=!menu.classList.contains('open'); menu.classList.toggle('open',open); menuToggle.setAttribute('aria-expanded',String(open))}); document.addEventListener('click',e=>{if(!e.target.closest('.menu-wrap'))closeMenu()});
prevBtn.addEventListener('click',()=>go(-1)); nextBtn.addEventListener('click',()=>go(1)); document.getElementById('continueBtn').addEventListener('click',()=>{closeMenu();render()}); document.getElementById('tocBtn').addEventListener('click',openOverlay); closeToc.addEventListener('click',closeOverlay); tocOverlay.addEventListener('click',e=>{if(e.target===tocOverlay)closeOverlay()});
document.querySelectorAll('[data-themebtn]').forEach(btn=>btn.addEventListener('click',()=>{theme=btn.dataset.themebtn;applyPrefs();savePrefs();closeMenu()})); document.getElementById('resetTheme').addEventListener('click',()=>{theme='dark';applyPrefs();savePrefs();closeMenu()}); document.getElementById('smallerText').addEventListener('click',()=>{fontSize=Math.max(15,fontSize-1);applyPrefs();savePrefs();repaginateSoon()}); document.getElementById('largerText').addEventListener('click',()=>{fontSize=Math.min(26,fontSize+1);applyPrefs();savePrefs();repaginateSoon()}); document.getElementById('resetText').addEventListener('click',()=>{fontSize=19;applyPrefs();savePrefs();repaginateSoon()});
window.addEventListener('resize',repaginateSoon,{passive:true}); window.addEventListener('orientationchange',repaginateSoon,{passive:true}); document.addEventListener('keydown',e=>{if(e.key==='ArrowLeft')go(-1); if(e.key==='ArrowRight')go(1); if(e.key==='Escape'){closeMenu();closeOverlay()}}); let sx=0,sy=0; pageEl.addEventListener('touchstart',e=>{const t=e.changedTouches[0]; sx=t.clientX; sy=t.clientY},{passive:true}); pageEl.addEventListener('touchend',e=>{const t=e.changedTouches[0],dx=t.clientX-sx,dy=t.clientY-sy; if(Math.abs(dx)>45&&Math.abs(dx)>Math.abs(dy)*1.25)go(dx<0?1:-1)},{passive:true});
applyPrefs(); render(); setTimeout(paginateNow,40);
})();
